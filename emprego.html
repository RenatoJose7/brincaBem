<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhe Conosco - BrincaBem</title>
    <link rel="icon" type="image/png" href="assets/img/BRINQUEDOS%20-%20BRINCABEM.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="header.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 80px auto;
            padding: 40px;
            border: 2px solid var(--azul);
            border-radius: 20px;
            font-family: poppins;
        }
        .form-container h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 60px;
            color: var(--azul);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: poppins;
            box-sizing: border-box;
        }
        .form-group textarea {
            resize: vertical;
            height: 120px;
        }
        .btn-submit {
            background-color: var(--vermelho);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            font-family: 'Caveat Brush', cursive;
            font-size: 24px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            background-color: var(--amarelo);
            color: black;
            transform: scale(1.02);
        }
        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-family: 'Caveat Brush', cursive;
            color: var(--azul);
            font-size: 24px;
            text-decoration: none;
        }
        .voltar::after {
            display: none;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    
    <main>
        <div class="form-container">
            <h2>Junte-se à Equipe!</h2>
            <form id="empregoForm" onsubmit="event.preventDefault(); alert('Candidatura enviada com sucesso! Em breve entraremos em contato.'); window.location.href='index.html';">
                <div class="form-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" required placeholder="Digite seu nome completo">
                </div>
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" required placeholder="Digite seu e-mail">
                </div>
                <div class="form-group">
                    <label for="telefone">Telefone:</label>
                    <input type="tel" id="telefone" required placeholder="(00) 00000-0000">
                </div>
                <div class="form-group">
                    <label for="mensagem">Por que você quer trabalhar na BrincaBem?</label>
                    <textarea id="mensagem" required placeholder="Conte um pouco sobre você e sua paixão por brinquedos clássicos..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Enviar Candidatura</button>
                <a href="index.html" class="voltar">Voltar para a página inicial</a>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
</body>
</html>
